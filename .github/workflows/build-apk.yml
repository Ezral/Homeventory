name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    name: Flutter APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Unit tests
        run: flutter test

      - name: Decode release keystore (optional)
        working-directory: ${{ github.workspace }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "No release keystore secret; release build will use debug signing."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > mobile/android/upload-keystore.jks
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=${{ github.workspace }}/mobile/android/upload-keystore.jks"
          } > mobile/android/key.properties

      - name: Build release APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          set -euo pipefail
          args=(build apk --release)
          if [ -n "${SUPABASE_URL:-}" ]; then
            args+=(--dart-define=SUPABASE_URL="$SUPABASE_URL")
          fi
          if [ -n "${SUPABASE_ANON_KEY:-}" ]; then
            args+=(--dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY")
          fi
          if [ -n "${GOOGLE_WEB_CLIENT_ID:-}" ]; then
            args+=(--dart-define=GOOGLE_WEB_CLIENT_ID="$GOOGLE_WEB_CLIENT_ID")
          fi
          flutter "${args[@]}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: homeventory-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
